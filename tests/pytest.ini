[pytest]
testpaths = tests security
addopts =
    --tb=short
    -v
    --html=reports/html/report.html
    --self-contained-html

markers =
    no_llm:     Tests that make zero LLM/API calls (safe to run anytime)
    llm:        Tests that call Gemini — use sparingly
    ui:         Playwright UI tests
    e2e:        End-to-end journey tests
    security:   Security tests

filterwarnings =
    ignore::DeprecationWarning
